name: Enrich All Mechanisms (one-time)

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Enrich all game mechanisms
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/enrich_all_mechs.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bgg_collection_scores.json
          git diff --staged --quiet || git commit -m "Enrich all games with comprehensive mechanisms"
          git push
